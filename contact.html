<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — TruthMirror</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Get in touch with TruthMirror. Support, legal and GDPR requests, plus company contact details.">
  <link rel="canonical" href="https://www.truthmirror.net/contact">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TruthMirror">
  <meta property="og:url" content="https://www.truthmirror.net/contact">
  <meta property="og:title" content="Contact — TruthMirror">
  <meta property="og:description" content="Get in touch with TruthMirror. Support, legal and GDPR requests, plus company contact details.">
  <meta property="og:image" content="https://www.truthmirror.net/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact — TruthMirror">
  <meta name="twitter:description" content="Get in touch with TruthMirror. Support, legal and GDPR requests, plus company contact details.">
  <meta name="twitter:image" content="https://www.truthmirror.net/og-image.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TruthMirror</a>
    <div class="lang-switch">
      <button data-lang="en">EN</button>
      <button data-lang="ro">RO</button>
      <button data-lang="es">ES</button>
      <button data-lang="ja">JA</button>
    </div>
  </nav>

  <div class="container">
    <div class="legal-page">
      <a href="/" class="back-link" data-i18n="contact.back">← Back</a>
      <h1 data-i18n="contact.title">Contact</h1>
      <p class="meta" data-i18n="contact.meta">We respond within 48 hours.</p>

      <p style="font-size: 18px; line-height: 1.8; color: var(--text);" data-i18n="contact.body">
        <strong>Support, legal &amp; GDPR requests:</strong> <a href="mailto:support@truthmirror.net" style="color: var(--accent);">support@truthmirror.net</a><br><br>
        <strong>Company:</strong> Social Media Group SRL<br>
        <strong>Address:</strong> București, România<br>
        <strong>Email:</strong> <a href="mailto:socialmediagroup@truthmirror.net" style="color: var(--accent);">socialmediagroup@truthmirror.net</a>
      </p>
    </div>
  </div>

  <script>
    const contactI18n = {
      en: {
        'contact.back': '← Back',
        'contact.title': 'Contact',
        'contact.meta': 'We respond within 48 hours.',
        'contact.body': '<strong>Support, legal &amp; GDPR requests:</strong> <a href="mailto:support@truthmirror.net" style="color: var(--accent);">support@truthmirror.net</a><br><br><strong>Company:</strong> Social Media Group SRL<br><strong>Address:</strong> București, România<br><strong>Email:</strong> <a href="mailto:socialmediagroup@truthmirror.net" style="color: var(--accent);">socialmediagroup@truthmirror.net</a>',
      },
      ro: {
        'contact.back': '← Înapoi',
        'contact.title': 'Contact',
        'contact.meta': 'Răspundem în 48 de ore.',
        'contact.body': '<strong>Suport, legal și cereri GDPR:</strong> <a href="mailto:support@truthmirror.net" style="color: var(--accent);">support@truthmirror.net</a><br><br><strong>Companie:</strong> Social Media Group SRL<br><strong>Adresă:</strong> București, România<br><strong>Email:</strong> <a href="mailto:socialmediagroup@truthmirror.net" style="color: var(--accent);">socialmediagroup@truthmirror.net</a>',
      },
      es: {
        'contact.back': '← Volver',
        'contact.title': 'Contacto',
        'contact.meta': 'Respondemos en 48 horas.',
        'contact.body': '<strong>Soporte, legal y solicitudes RGPD:</strong> <a href="mailto:support@truthmirror.net" style="color: var(--accent);">support@truthmirror.net</a><br><br><strong>Empresa:</strong> Social Media Group SRL<br><strong>Dirección:</strong> Bucarest, Rumanía<br><strong>Email:</strong> <a href="mailto:socialmediagroup@truthmirror.net" style="color: var(--accent);">socialmediagroup@truthmirror.net</a>',
      },
      ja: {
        'contact.back': '← 戻る',
        'contact.title': 'お問い合わせ',
        'contact.meta': '48時間以内に返信いたします。',
        'contact.body': '<strong>サポート・法務・GDPR に関するご請求:</strong> <a href="mailto:support@truthmirror.net" style="color: var(--accent);">support@truthmirror.net</a><br><br><strong>会社:</strong> Social Media Group SRL<br><strong>所在地:</strong> ルーマニア・ブカレスト<br><strong>メール:</strong> <a href="mailto:socialmediagroup@truthmirror.net" style="color: var(--accent);">socialmediagroup@truthmirror.net</a>',
      },
    };

    function applyContactLang(lang) {
      const t = contactI18n[lang] || contactI18n.en;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (t[key] != null) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-switch button').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('tm.site.lang', lang);
    }

    function detectInitialLang() {
      var saved = localStorage.getItem('tm.site.lang');
      if (saved && contactI18n[saved]) return saved;
      var browser = (navigator.language || 'en').slice(0, 2);
      return contactI18n[browser] ? browser : 'en';
    }

    document.addEventListener('DOMContentLoaded', function () {
      applyContactLang(detectInitialLang());
      document.querySelectorAll('.lang-switch button').forEach(function (btn) {
        btn.addEventListener('click', function () { applyContactLang(btn.dataset.lang); });
      });
    });
  </script>
</body>
</html>

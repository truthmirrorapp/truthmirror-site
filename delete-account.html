  <script>
    // ---- Conținut per limbă (text simplu; parserul îl transformă în HTML stilizat,

    const CONTENT = {
      en: `ACCOUNT & DATA DELETION
TruthMirror

1. DELETE DIRECTLY IN THE APP (FASTEST)
The quickest way to delete your account is inside the app:
- Open TruthMirror and go to Settings.
- Tap "Delete account" and confirm.
This permanently and immediately deletes your account and all associated data. No further steps are needed.

2. REQUEST DELETION BY EMAIL
If you can no longer access the app, you can ask us to delete your account:
- Email support@truthmirror.net from, or mentioning, the email address you used to sign in.
- Use the subject "Delete my account".
We verify each request and complete it without undue delay, and within 30 days at the latest.

3. WHAT WE DELETE
When your account is deleted, we remove from our servers:
- Your email address;
- Your date of birth;
- Your device identifier;
- Your language preference;
- Your subscription indicator and the content-free usage counter.
All data kept on your device (conversations, statistics, clarity score, tags and the app-lock PIN) is removed when you delete your account in the app or uninstall the app. We never store your conversations on our servers.

4. WHAT WE MAY KEEP
To protect minors and prevent abuse, if an account was blocked (for example because it belonged to a person under 18), we keep an irreversible cryptographic hash of the email address and the device identifier on a block list, even after deletion. This list never contains your email in clear text and cannot be used to contact you or for marketing. The legal basis is our legitimate interest in protecting minors and the integrity of the Service (Article 6(1)(f) GDPR). See section 7.3 of our Privacy Policy.

5. SUBSCRIPTIONS
Deleting your account does not automatically cancel a paid subscription billed by the App Store or Google Play. To stop future charges, cancel the subscription in your store account (App Store: Settings, Apple ID, Subscriptions; or Google Play: Profile, Payments & subscriptions).

6. CONTACT
For anything related to your data or your rights under the GDPR, contact support@truthmirror.net. See also our Privacy Policy and Terms of Service.`,

      ro: `ȘTERGEREA CONTULUI ȘI A DATELOR
TruthMirror

1. ȘTERGE DIRECT DIN APLICAȚIE (CEL MAI RAPID)
Cel mai rapid mod de a-ți șterge contul este din aplicație:
- Deschide TruthMirror și mergi la Setări.
- Apasă „Șterge contul" și confirmă.
Asta îți șterge definitiv și imediat contul și toate datele asociate. Nu mai e nevoie de niciun alt pas.

2. CERE ȘTERGEREA PRIN EMAIL
Dacă nu mai poți accesa aplicația, ne poți cere să-ți ștergem contul:
- Scrie la support@truthmirror.net de pe adresa de email cu care te-ai autentificat (sau menționând-o).
- Folosește subiectul „Șterge contul meu".
Verificăm fiecare cerere și o procesăm fără întârziere nejustificată, în cel mult 30 de zile.

3. CE ȘTERGEM
Când contul tău este șters, eliminăm de pe serverele noastre:
- Adresa ta de email;
- Data nașterii;
- Identificatorul dispozitivului;
- Preferința de limbă;
- Indicatorul abonamentului și contorul de utilizare fără conținut.
Toate datele păstrate pe dispozitivul tău (conversații, statistici, scorul de claritate, etichete și PIN-ul de blocare) sunt eliminate când îți ștergi contul din aplicație sau când dezinstalezi aplicația. Nu stocăm niciodată conversațiile tale pe serverele noastre.

4. CE PUTEM PĂSTRA
Pentru protecția minorilor și prevenirea abuzului, dacă un cont a fost blocat (de exemplu pentru că aparținea unei persoane sub 18 ani), păstrăm pe o listă de blocare o versiune criptografică ireversibilă (hash) a adresei de email și identificatorul dispozitivului, chiar și după ștergere. Această listă nu conține niciodată emailul tău în clar și nu poate fi folosită pentru a te contacta sau pentru marketing. Baza legală este interesul nostru legitim de a proteja minorii și integritatea Serviciului (Articolul 6(1)(f) GDPR). Vezi secțiunea 7.3 din Politica de confidențialitate.

5. ABONAMENTE
Ștergerea contului nu anulează automat un abonament plătit facturat prin App Store sau Google Play. Ca să oprești plățile viitoare, anulează abonamentul din contul tău de store (App Store: Setări, Apple ID, Abonamente; sau Google Play: Profil, Plăți și abonamente).

6. CONTACT
Pentru orice legat de datele tale sau de drepturile tale conform GDPR, scrie la support@truthmirror.net. Vezi și Politica de confidențialitate și Termenii și condițiile.`,

      es: `ELIMINACIÓN DE CUENTA Y DATOS
TruthMirror

1. ELIMINA DIRECTAMENTE EN LA APP (LO MÁS RÁPIDO)
La forma más rápida de eliminar tu cuenta es dentro de la app:
- Abre TruthMirror y ve a Ajustes.
- Toca «Eliminar cuenta» y confirma.
Esto elimina de forma permanente e inmediata tu cuenta y todos los datos asociados. No hace falta nada más.

2. SOLICITA LA ELIMINACIÓN POR CORREO
Si ya no puedes acceder a la app, puedes pedirnos que eliminemos tu cuenta:
- Escribe a support@truthmirror.net desde la dirección de correo con la que iniciaste sesión (o mencionándola).
- Usa el asunto «Eliminar mi cuenta».
Verificamos cada solicitud y la completamos sin demora indebida, y como máximo en 30 días.

3. QUÉ ELIMINAMOS
Cuando se elimina tu cuenta, borramos de nuestros servidores:
- Tu dirección de correo;
- Tu fecha de nacimiento;
- El identificador de tu dispositivo;
- Tu preferencia de idioma;
- El indicador de tu suscripción y el contador de uso sin contenido.
Todos los datos guardados en tu dispositivo (conversaciones, estadísticas, puntuación de claridad, etiquetas y el PIN de bloqueo) se eliminan cuando borras tu cuenta en la app o desinstalas la app. Nunca almacenamos tus conversaciones en nuestros servidores.

4. QUÉ PODEMOS CONSERVAR
Para proteger a los menores y prevenir abusos, si una cuenta fue bloqueada (por ejemplo, porque pertenecía a una persona menor de 18 años), conservamos en una lista de bloqueo una versión criptográfica irreversible (hash) de la dirección de correo y el identificador del dispositivo, incluso tras la eliminación. Esta lista nunca contiene tu correo en texto claro y no puede usarse para contactarte ni para marketing. La base legal es nuestro interés legítimo en proteger a los menores y la integridad del Servicio (Artículo 6(1)(f) del RGPD). Consulta la sección 7.3 de nuestra Política de privacidad.

5. SUSCRIPCIONES
Eliminar tu cuenta no cancela automáticamente una suscripción de pago facturada por App Store o Google Play. Para detener cargos futuros, cancela la suscripción en tu cuenta de la tienda (App Store: Ajustes, Apple ID, Suscripciones; o Google Play: Perfil, Pagos y suscripciones).

6. CONTACTO
Para cualquier asunto relacionado con tus datos o tus derechos bajo el RGPD, escribe a support@truthmirror.net. Consulta también nuestra Política de privacidad y los Términos del servicio.`,

      ja: `アカウントとデータの削除
TruthMirror

1. アプリ内で直接削除する（最速）
アカウントを削除する最も早い方法は、アプリ内から行うことです。
- TruthMirror を開き、「設定」に移動します。
- 「アカウントを削除」をタップして確認します。
これにより、アカウントと関連するすべてのデータが即座に完全に削除されます。他に必要な手順はありません。

2. メールで削除を依頼する
アプリにアクセスできなくなった場合は、メールでアカウント削除を依頼できます。
- ログインに使用したメールアドレスから（またはそのアドレスを記載して）support@truthmirror.net までご連絡ください。
- 件名は「アカウントを削除」としてください。
各依頼を確認し、不当に遅延することなく、遅くとも30日以内に対応します。

3. 削除する内容
アカウントが削除されると、当社のサーバーから次の情報を削除します。
- メールアドレス
- 生年月日
- デバイス識別子
- 言語設定
- サブスクリプションの表示と、内容を含まない利用カウンター
端末内に保存されたすべてのデータ（会話、統計、明晰さスコア、タグ、アプリロックのPIN）は、アプリ内でアカウントを削除するか、アプリをアンインストールすると削除されます。当社が会話をサーバーに保存することは一切ありません。

4. 保持する場合がある内容
未成年者の保護と不正利用の防止のため、アカウントがブロックされた場合（例：18歳未満の人物のものであった場合）、削除後もメールアドレスの不可逆な暗号ハッシュとデバイス識別子をブロックリストに保持します。このリストにメールアドレスが平文で含まれることはなく、連絡やマーケティングに使用することはできません。法的根拠は、未成年者の保護とサービスの完全性に対する当社の正当な利益です（GDPR 第6条1項(f)）。プライバシーポリシーの第7.3項をご覧ください。

5. サブスクリプション
アカウントを削除しても、App Store または Google Play で請求される有料サブスクリプションは自動的には解約されません。今後の請求を停止するには、ストアのアカウントでサブスクリプションを解約してください（App Store：設定、Apple ID、サブスクリプション、または Google Play：プロフィール、お支払いと定期購入）。

6. お問い合わせ
データや GDPR に基づくお客様の権利に関するご質問は、support@truthmirror.net までご連絡ください。プライバシーポリシーおよび利用規約もご参照ください。`,
    };

    const labels = {
      en: { title: 'Account & Data Deletion', subtitle: 'How to delete your TruthMirror account and data.', back: 'Back', emailBtn: 'Email us to delete', privacyBtn: 'Privacy Policy', termsBtn: 'Terms of Service' },
      ro: { title: 'Ștergerea contului și a datelor', subtitle: 'Cum îți ștergi contul și datele TruthMirror.', back: 'Înapoi', emailBtn: 'Scrie-ne pentru ștergere', privacyBtn: 'Politica de confidențialitate', termsBtn: 'Termeni și condiții' },
      es: { title: 'Eliminación de cuenta y datos', subtitle: 'Cómo eliminar tu cuenta y tus datos de TruthMirror.', back: 'Atrás', emailBtn: 'Escríbenos para eliminar', privacyBtn: 'Política de privacidad', termsBtn: 'Términos del servicio' },
      ja: { title: 'アカウントとデータの削除', subtitle: 'TruthMirror のアカウントとデータを削除する方法。', back: '戻る', emailBtn: '削除を依頼する', privacyBtn: 'プライバシーポリシー', termsBtn: '利用規約' },
    };

    function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const reSection = /^(\d{1,2})\.\s+(.+)$/;
    const reSub = /^(\d{1,2}\.\d{1,2})\s+(.+)$/;
    const reBullet = /^-\s+(.+)$/;

    function buildHtml(raw){
      const lines = raw.replace(/\r\n/g,'\n').split('\n');
      let i = 0;
      // sar peste titlul doc + TruthMirror (le avem deja in <h1>/<p class=meta>)
      while (i < lines.length && !reSection.test(lines[i].trim())) i++;
      const out = [];
      let bullets = [];
      const flush = () => {
        if (bullets.length){
          out.push('<ul class="ld-list">' + bullets.map(b=>'<li>'+escHtml(b)+'</li>').join('') + '</ul>');
          bullets = [];
        }
      };
      for (; i < lines.length; i++){
        const ln = lines[i].trim();
        if (!ln){ flush(); continue; }
        const mBul = ln.match(reBullet);
        if (mBul){ bullets.push(mBul[1]); continue; }
        flush();
        const mSub = ln.match(reSub);
        const mSec = ln.match(reSection);
        if (mSec && !mSub){
          out.push('<h2 class="ld-section" id="s-'+mSec[1]+'"><span class="ld-num">'+mSec[1]+'.</span>'+escHtml(mSec[2])+'</h2>');
        } else if (mSub){
          out.push('<h3 class="ld-sub"><span class="ld-subnum">'+escHtml(mSub[1])+'</span>'+escHtml(mSub[2])+'</h3>');
        } else {
          out.push('<p class="ld-p">'+escHtml(ln)+'</p>');
        }
      }
      flush();
      return out.join('\n');
    }

    function render(lang){
      const raw = CONTENT[lang] || CONTENT.en;
      document.getElementById('legalContent').innerHTML = buildHtml(raw);
      document.documentElement.lang = lang;
      const l = labels[lang] || labels.en;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (l[key]) el.textContent = l[key];
      });
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('tm.site.lang', lang);
    }

    const saved = localStorage.getItem('tm.site.lang');
    const browser = (navigator.language || 'en').slice(0, 2);
    const initialLang = ['en','ro','es','ja'].includes(saved) ? saved : (['en','ro','es','ja'].includes(browser) ? browser : 'en');

    document.addEventListener('DOMContentLoaded', () => {
      render(initialLang);
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.addEventListener('click', () => render(btn.dataset.lang));
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — TruthMirror</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="TruthMirror Privacy Policy — what we collect, how it's stored, and your GDPR rights.">
  <link rel="canonical" href="https://www.truthmirror.net/privacy">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TruthMirror">
  <meta property="og:url" content="https://www.truthmirror.net/privacy">
  <meta property="og:title" content="Privacy Policy — TruthMirror">
  <meta property="og:description" content="TruthMirror Privacy Policy — what we collect, how it's stored, and your GDPR rights.">
  <meta property="og:image" content="https://www.truthmirror.net/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Privacy Policy — TruthMirror">
  <meta name="twitter:description" content="TruthMirror Privacy Policy — what we collect, how it's stored, and your GDPR rights.">
  <meta name="twitter:image" content="https://www.truthmirror.net/og-image.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ---- Stil dedicat documentului legal (self-contained) ---- */
    .legal-doc {
      --ld-accent: #CC0000;
      --ld-accent-soft: rgba(204, 0, 0, 0.10);
      --ld-accent-line: rgba(204, 0, 0, 0.35);
      --ld-text: #e8e6e3;
      --ld-text-muted: #b5b2ae;
      --ld-text-dim: #8a8784;
      --ld-border: #242424;
      --ld-surface: #121212;
      max-width: 820px;
      margin: 0 auto;
      font-family: 'Georgia', 'Iowan Old Style', 'Palatino', serif;
      line-height: 1.75;
      color: var(--ld-text-muted);
    }
    .legal-doc .ld-section {
      font-family: 'Inter', sans-serif;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--ld-text);
      margin: 2.6rem 0 0.9rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--ld-border);
      scroll-margin-top: 1rem;
    }
    .legal-doc .ld-section:first-child { border-top: none; padding-top: 0; margin-top: 0.5rem; }
    .legal-doc .ld-section .ld-num { color: var(--ld-accent); margin-right: 0.5rem; }
    .legal-doc .ld-sub {
      font-family: 'Inter', sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--ld-text-muted);
      margin: 1.4rem 0 0.45rem;
    }
    .legal-doc .ld-sub .ld-subnum { color: var(--ld-text); font-weight: 800; margin-right: 0.35rem; }
    .legal-doc .ld-p { margin: 0.8rem 0; font-size: 1.04rem; }
    .legal-doc .ld-list { list-style: none; margin: 0.6rem 0 1rem; padding: 0; }
    .legal-doc .ld-list li {
      position: relative; padding-left: 1.4rem; margin: 0.4rem 0; font-size: 1.02rem;
    }
    .legal-doc .ld-list li::before {
      content: ""; position: absolute; left: 0; top: 0.72em;
      width: 6px; height: 6px; background: var(--ld-accent); border-radius: 50%;
    }
    .legal-doc .ld-block {
      background: var(--ld-surface);
      border: 1px solid var(--ld-border);
      border-left: 2px solid var(--ld-accent);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin: 1.2rem 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .legal-doc mark {
      background: var(--ld-accent-soft);
      color: var(--ld-text);
      padding: 0.05em 0.3em;
      border-radius: 3px;
      font-weight: 600;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .legal-doc strong { color: var(--ld-text); font-weight: 700; }
    .legal-doc a { color: var(--ld-accent); }
    @media (max-width: 600px) {
      .legal-doc .ld-section { font-size: 1.05rem; }
      .legal-doc .ld-p, .legal-doc .ld-list li { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TruthMirror</a>
    <div class="lang-switch">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ro">RO</button>
      <button data-lang="es">ES</button>
      <button data-lang="ja">JA</button>
    </div>
  </nav>

  <div class="container">
    <div class="legal-page">
      <a href="/" class="back-link">← <span data-i18n="back">Back</span></a>
      <h1 data-i18n="title">Privacy Policy</h1>
      <p class="meta" data-i18n="meta">Effective date: 28 May 2026 · Version: 2026-05-28</p>

      <div id="legalContent" class="legal-doc">Loading...</div>
    </div>
  </div>

  <script src="legal/privacy.en.js"></script>
  <script src="legal/privacy.ro.js"></script>
  <script src="legal/privacy.es.js"></script>
  <script src="legal/privacy.ja.js"></script>
  <script>
    const labels = {
      en: { title: 'Privacy Policy', back: 'Back', meta: 'Effective date: 28 May 2026 · Version: 2026-05-28' },
      ro: { title: 'Politica de confidențialitate', back: 'Înapoi', meta: 'Data intrării în vigoare: 28 mai 2026 · Versiunea: 2026-05-28' },
      es: { title: 'Política de privacidad', back: 'Atrás', meta: 'Fecha de entrada en vigor: 28 de mayo de 2026 · Versión: 2026-05-28' },
      ja: { title: 'プライバシーポリシー', back: '戻る', meta: '発効日: 2026年5月28日 · バージョン: 2026-05-28' },
    };

    // Cuvinte-cheie GDPR evidențiate, per limbă
    const KEYWORDS = {
      ro: ['GDPR','ANSPDCP','date cu caracter personal','dreptul de acces','dreptul la ștergere','dreptul la portabilitate','dreptul la rectificare','dreptul de opoziție','consimțământ','interes legitim','Clauzelor Contractuale Standard','Clauze Contractuale Standard','operator de date','persoane împuternicite','profilare','decizii automate','Articolul 22','dreptul de a fi uitat','Legea 190/2018','rambursare integrală','retragere','18 ani','minori','Apple Inc','Google LLC','terți beneficiari'],
      en: ['GDPR','ANSPDCP','personal data','right of access','right to erasure','right to data portability','right to rectification','right to object','consent','legitimate interest','Standard Contractual Clauses','data controller','processors','profiling','automated decisions','Article 22','right to be forgotten','full refund','18 and over','minors','Apple Inc','Google LLC','third-party beneficiaries'],
      es: ['RGPD','GDPR','ANSPDCP','datos personales','derecho de acceso','derecho de supresión','derecho a la portabilidad','derecho de rectificación','derecho de oposición','consentimiento','interés legítimo','Cláusulas Contractuales Estándar','responsable del tratamiento','encargados del tratamiento','elaboración de perfiles','decisiones automatizadas','Artículo 22','derecho al olvido','reembolso','18 años','menores','Apple Inc','Google LLC','terceros beneficiarios'],
      ja: ['GDPR','ANSPDCP','個人データ','アクセス権','消去権','データポータビリティ','訂正権','異議申立権','同意','正当な利益','標準契約条項','データ管理者','プロファイリング','自動化された意思決定','第22条','忘れられる権利','返金','18歳','未成年者','Apple Inc','Google LLC','第三者受益者'],
    };

    function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    function highlight(html, lang){
      const kws = (KEYWORDS[lang]||[]).slice().sort((a,b)=>b.length-a.length);
      for (const k of kws){
        const re = new RegExp('(?<![\\w])(' + escReg(escHtml(k)) + ')(?![\\w])', 'gi');
        html = html.replace(re, '<mark>$1</mark>');
      }
      return html;
    }

    const reSection = /^(\d{1,2})\.\s+(.+)$/;
    const reSub = /^(\d{1,2}\.\d{1,2})\s+(.+)$/;
    const reBullet = /^-\s+(.+)$/;

    function buildHtml(raw, lang){
      const lines = raw.replace(/\r\n/g,'\n').split('\n');
      let i = 0;
      // sar peste titlul doc + TruthMirror + meta (le avem deja in <h1>/<p class=meta>)
      while (i < lines.length && !reSection.test(lines[i].trim())) i++;
      const out = [];
      let bullets = [];
      const flush = () => {
        if (bullets.length){
          out.push('<ul class="ld-list">' + bullets.map(b=>'<li>'+highlight(escHtml(b),lang)+'</li>').join('') + '</ul>');
          bullets = [];
        }
      };
      for (; i < lines.length; i++){
        const ln = lines[i].trim();
        if (!ln){ flush(); continue; }
        const mBul = ln.match(reBullet);
        if (mBul){ bullets.push(mBul[1]); continue; }
        flush();
        const mSub = ln.match(reSub);
        const mSec = ln.match(reSection);
        if (mSec && !mSub){
          out.push('<h2 class="ld-section" id="s-'+mSec[1]+'"><span class="ld-num">'+mSec[1]+'.</span>'+highlight(escHtml(mSec[2]),lang)+'</h2>');
        } else if (mSub){
          out.push('<h3 class="ld-sub"><span class="ld-subnum">'+escHtml(mSub[1])+'</span>'+highlight(escHtml(mSub[2]),lang)+'</h3>');
        } else {
          out.push('<p class="ld-p">'+highlight(escHtml(ln),lang)+'</p>');
        }
      }
      flush();
      return out.join('\n');
    }

    function renderPrivacy(lang){
      const map = { en: window.PRIVACY_EN, ro: window.PRIVACY_RO, es: window.PRIVACY_ES, ja: window.PRIVACY_JA };
      const raw = map[lang] || map.en;
      document.getElementById('legalContent').innerHTML = buildHtml(raw, lang);
      document.documentElement.lang = lang;
      const l = labels[lang] || labels.en;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (l[key]) el.textContent = l[key];
      });
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('tm.site.lang', lang);
    }

    const saved = localStorage.getItem('tm.site.lang');
    const browser = navigator.language.slice(0, 2);
    const initialLang = ['en','ro','es','ja'].includes(saved) ? saved : (['en','ro','es','ja'].includes(browser) ? browser : 'en');

    document.addEventListener('DOMContentLoaded', () => {
      renderPrivacy(initialLang);
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.addEventListener('click', () => renderPrivacy(btn.dataset.lang));
      });
    });
  </script>
</body>
</html>

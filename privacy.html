<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — TruthMirror</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TruthMirror</a>
    <div class="lang-switch">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ro">RO</button>
      <button data-lang="es">ES</button>
    </div>
  </nav>

  <div class="container">
    <div class="legal-page">
      <a href="/" class="back-link">← <span data-i18n="back">Back</span></a>
      <h1 data-i18n="title">Privacy Policy</h1>
      <p class="meta" data-i18n="meta">Effective date: 11 May 2026 · Version: 2026-05-11</p>

      <pre id="legalContent">Loading...</pre>
    </div>
  </div>

  <script src="legal/privacy.en.js"></script>
  <script src="legal/privacy.ro.js"></script>
  <script src="legal/privacy.es.js"></script>
  <script>
    const labels = {
      en: { title: 'Privacy Policy', back: 'Back', meta: 'Effective date: 11 May 2026 · Version: 2026-05-11' },
      ro: { title: 'Politica de confidențialitate', back: 'Înapoi', meta: 'Data intrării în vigoare: 11 mai 2026 · Versiunea: 2026-05-11' },
      es: { title: 'Política de privacidad', back: 'Atrás', meta: 'Fecha de entrada en vigor: 11 de mayo de 2026 · Versión: 2026-05-11' },
    };

    function renderPrivacy(lang) {
      const map = { en: window.PRIVACY_EN, ro: window.PRIVACY_RO, es: window.PRIVACY_ES };
      document.getElementById('legalContent').textContent = map[lang] || map.en;
      document.documentElement.lang = lang;
      const l = labels[lang] || labels.en;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (l[key]) el.textContent = l[key];
      });
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('tm.site.lang', lang);
    }

    const saved = localStorage.getItem('tm.site.lang');
    const browser = navigator.language.slice(0, 2);
    const initialLang = ['en','ro','es'].includes(saved) ? saved : (['en','ro','es'].includes(browser) ? browser : 'en');

    document.addEventListener('DOMContentLoaded', () => {
      renderPrivacy(initialLang);
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.addEventListener('click', () => renderPrivacy(btn.dataset.lang));
      });
    });
  </script>
</body>
</html>

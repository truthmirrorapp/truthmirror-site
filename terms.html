<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Service — TruthMirror</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TruthMirror</a>
    <div class="lang-switch">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ro">RO</button>
      <button data-lang="es">ES</button>
      <button data-lang="ja">JA</button>
    </div>
  </nav>

  <div class="container">
    <div class="legal-page">
      <a href="/" class="back-link">← <span data-i18n="back">Back</span></a>
      <h1 data-i18n="title">Terms of Service</h1>
      <p class="meta" data-i18n="meta">Effective date: 28 May 2026 · Version: 2026-05-28</p>

      <pre id="legalContent">Loading...</pre>
    </div>
  </div>

  <script src="legal/terms.en.js"></script>
  <script src="legal/terms.ro.js"></script>
  <script src="legal/terms.es.js"></script>
  <script src="legal/terms.ja.js"></script>
  <script>
    const labels = {
      en: { title: 'Terms of Service', back: 'Back', meta: 'Effective date: 28 May 2026 · Version: 2026-05-28' },
      ro: { title: 'Termeni și condiții', back: 'Înapoi', meta: 'Data intrării în vigoare: 28 mai 2026 · Versiunea: 2026-05-28' },
      es: { title: 'Términos de servicio', back: 'Atrás', meta: 'Fecha de entrada en vigor: 28 de mayo de 2026 · Versión: 2026-05-28' },
      ja: { title: '利用規約', back: '戻る', meta: '発効日: 2026年5月28日 · バージョン: 2026-05-28' },
    };

    function renderTerms(lang) {
      const map = { en: window.TERMS_EN, ro: window.TERMS_RO, es: window.TERMS_ES, ja: window.TERMS_JA };
      document.getElementById('legalContent').textContent = map[lang] || map.en;
      document.documentElement.lang = lang;
      const l = labels[lang] || labels.en;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (l[key]) el.textContent = l[key];
      });
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('tm.site.lang', lang);
    }

    const saved = localStorage.getItem('tm.site.lang');
    const browser = navigator.language.slice(0, 2);
    const initialLang = ['en','ro','es','ja'].includes(saved) ? saved : (['en','ro','es','ja'].includes(browser) ? browser : 'en');

    document.addEventListener('DOMContentLoaded', () => {
      renderTerms(initialLang);
      document.querySelectorAll('.lang-switch button').forEach((btn) => {
        btn.addEventListener('click', () => renderTerms(btn.dataset.lang));
      });
    });
  </script>
</body>
</html>
